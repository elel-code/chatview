syntax = "proto3";

package chatview.events;

option go_package = "chatview/api/gen/chatview/events;eventspb";
option cc_enable_arenas = true;

// ─────────────────────────────────────────────
// EventService — 服务端 → 客户端实时事件推送
//
// 使用 gRPC server-streaming RPC:
//   客户端发起 Subscribe，服务端持续推送事件流。
//
// 对应桌面客户端事件:
//   messages-pending  → NewMessageEvent
//   friend-status     → FriendStatusEvent
//   system-broadcast  → SystemBroadcastEvent
//   force-offline     → ForceOfflineEvent
//   admin-update      → AdminUpdateEvent
//
// gRPC metadata 需携带 authorization: Bearer <session_token>
// ─────────────────────────────────────────────

// ── 订阅请求 ─────────────────────────────────

message SubscribeReq {
  // 可选的设备/客户端标识，用于服务端追踪连接
  string client_id = 1;
}

// ── 事件定义 ─────────────────────────────────

// 新消息通知 — 对应 messages-pending
//
// gRPC 流携带完整事件；桌面客户端可以用 from_pub_key 定位需要刷新的会话。
// count 字段供客户端优化积压消息拉取策略，不要求 UI 直接展示。
//
// 前端收到后调用 ChatService.GetMessageHistory（direction=newer）拉取实际消息内容。
message NewMessageEvent {
  string  from_pub_key = 1;  // 发来新消息的好友公钥
  int32   count        = 2;  // 待拉取消息数（客户端优化用）
}

// 好友状态变更 — 对应 friend-status
// 对应前端 FriendStatusEvent 接口
message FriendStatusEvent {
  string pub_key   = 1;                   // 好友公钥
  string alias     = 2;                   // 别名（可选）
  bool   is_online = 3;                   // 当前在线状态
}

// 系统广播 — 对应 system-broadcast
message SystemBroadcastEvent {
  string text       = 1;  // 广播文本
  string from_admin = 2;  // 发送广播的管理员公钥
}

// 强制下线 — 对应 force-offline
// 当用户被封禁或服务端主动踢出时推送
message ForceOfflineEvent {
  string reason = 1;  // 下线原因（如 "account_banned"）
}

// 管理员视图失效通知 — 对应 admin-update
//
// 事件不携带完整快照；前端收到后调用 AdminService.PollAdminEvents 拉取权威数据。
message AdminUpdateEvent {}

// ── 事件容器 (oneof) ────────────────────────

message ServerEvent {
  oneof event {
    NewMessageEvent       new_message       = 1;
    FriendStatusEvent     friend_status     = 2;
    SystemBroadcastEvent  system_broadcast  = 3;
    ForceOfflineEvent     force_offline     = 4;
    AdminUpdateEvent      admin_update      = 5;
  }
}

// ─────────────────────────────────────────────
// Service
// ─────────────────────────────────────────────

service EventService {
  // 订阅实时事件流。客户端应在登录成功后立即调用并保持长连接。
  // 连接断开时客户端负责重连（exponential backoff）。
  rpc Subscribe(SubscribeReq) returns (stream ServerEvent);
}
