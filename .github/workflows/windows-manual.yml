name: Windows Manual

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run Go tests before building"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  windows:
    name: Windows Build
    runs-on: windows-latest

    env:
      CGO_ENABLED: "1"
      CC: clang
      CXX: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache-dependency-path: |
            api/go.sum
            server/go.sum
            client/go.sum

      - name: Show toolchain
        shell: pwsh
        run: |
          go version
          clang --version
          clang++ --version
          go env CGO_ENABLED CC CXX

      - name: Test API
        if: ${{ inputs.run_tests }}
        working-directory: api
        run: go test ./...

      - name: Test server
        if: ${{ inputs.run_tests }}
        working-directory: server
        run: go test ./...

      - name: Test client
        if: ${{ inputs.run_tests }}
        working-directory: client
        run: go test ./...

      - name: Create artifact directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build server
        working-directory: server
        run: go build -v -o ../dist/chatview-server-windows-amd64.exe ./cmd/server

      - name: Build client
        working-directory: client
        run: go build -v -o ../dist/chatview-client-windows-amd64.exe ./cmd/client

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: chatview-windows-amd64
          path: dist/*.exe
          if-no-files-found: error
