name: Windows Manual

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run Go tests before building"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  windows:
    name: Windows Build
    runs-on: windows-latest

    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-Wno-invalid-command-line-argument -Wno-unused-command-line-argument"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache-dependency-path: |
            api/go.sum
            server/go.sum
            client/go.sum

      - name: Download and install latest Clang
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Fetching latest LLVM release info..."
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/llvm/llvm-project/releases/latest"
          $version = $release.tag_name -replace '^llvmorg-', ''
          Write-Host "Latest LLVM version: $version"

          $asset = $release.assets | Where-Object { $_.name -match 'LLVM-[\d.]+-win64\.exe$' } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "Could not find Windows 64-bit installer in release assets"
            exit 1
          }

          Write-Host "Found: $($asset.name) ($([math]::Round($asset.size / 1MB, 1)) MB)"

          $installerPath = "$env:RUNNER_TEMP\llvm-installer.exe"
          Write-Host "Downloading from $($asset.browser_download_url)..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $installerPath

          $installDir = "C:\llvm"
          Write-Host "Installing to $installDir (silent mode)..."
          Start-Process -Wait -FilePath $installerPath -ArgumentList "/S /D=$installDir"

          Write-Host "Installation complete. Clang version:"
          & "$installDir\bin\clang.exe" --version

          # Add to PATH and set CC / CXX for subsequent steps
          "$installDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CC=$installDir\bin\clang.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=$installDir\bin\clang++.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show toolchain
        shell: pwsh
        run: |
          go version
          clang --version
          clang++ --version
          go env CGO_ENABLED CC CXX

      - name: Test API
        if: ${{ inputs.run_tests }}
        working-directory: api
        run: go test ./...

      - name: Test server
        if: ${{ inputs.run_tests }}
        working-directory: server
        run: go test ./...

      - name: Test client
        if: ${{ inputs.run_tests }}
        working-directory: client
        run: go test ./...

      - name: Create artifact directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build server
        working-directory: server
        run: go build -v -ldflags="-s -w" -o ../dist/chatview-server-windows-amd64.exe ./cmd/server

      - name: Build client
        working-directory: client
        run: go build -v -ldflags="-s -w -H=windowsgui" -o ../dist/chatview-client-windows-amd64.exe ./cmd/client

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: chatview-windows-amd64
          path: dist/*.exe
          if-no-files-found: error
