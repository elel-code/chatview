syntax = "proto3";

package chatview.admin;

import "chatview/common/types.proto";

option go_package = "chatview/gen/chatview/admin;adminpb";
option cc_enable_arenas = true;

// ─────────────────────────────────────────────
// AdminService — 管理员操作
//
// 所有 RPC 需在 gRPC metadata 中携带:
//   authorization: Bearer <session_token>
//
// Go 服务端对每个 RPC 二次校验 role == ADMIN。
// 前端仅根据 role 控制 UI 展示，不依赖前端做权限裁决。
// ─────────────────────────────────────────────

// ── 用户管理 ─────────────────────────────────

message SetUserStatusReq {
  string                    target_pub_key = 1;  // 目标用户公钥
  chatview.common.UserStatus status        = 2;  // USER_STATUS_ACTIVE 或 USER_STATUS_BANNED
}

message SetUserStatusResp {}

// ── 全服广播 ─────────────────────────────────

message BroadcastReq {
  string text = 1;  // 广播内容
}

message BroadcastResp {}

// ── 轮询管理员事件 ────────────────────────────

// 拉取管理员面板增量数据（用户列表 + 统计数据）。
// 前端定时或收到推送信号后调用此 RPC。
message PollAdminEventsReq {}

message PollAdminEventsResp {
  chatview.common.AdminUpdate update = 1;
}

// ─────────────────────────────────────────────
// Service
// ─────────────────────────────────────────────

service AdminService {
  // 设置用户状态（封禁/解封）
  // 封禁时服务端向目标用户推送 saucer:force-offline 事件
  rpc SetUserStatus(SetUserStatusReq) returns (SetUserStatusResp);

  // 发送全服广播
  // 所有在线用户收到 saucer:system-broadcast 事件
  rpc Broadcast(BroadcastReq) returns (BroadcastResp);

  // 轮询管理员面板数据
  rpc PollAdminEvents(PollAdminEventsReq) returns (PollAdminEventsResp);
}
